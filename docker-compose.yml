version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:///./database.db
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data
    command: bash -c "cd /app/backend && python main.py"

  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app/frontend
    command: bash -c "cd /app/frontend && npm start"

volumes:
  data:
